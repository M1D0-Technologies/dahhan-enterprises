<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Dahhan Enterprises">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4b07a"/>
      <stop offset="1" stop-color="#e9c890"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.14" cy="0.5" r="0.9">
      <stop offset="0" stop-color="#d4b07a" stop-opacity="0.14"/>
      <stop offset="0.55" stop-color="#d4b07a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="360" fill="#0c0b09"/>
  <rect width="1200" height="360" fill="url(#glow)"/>
  <!-- hairline frame -->
  <rect x="0.5" y="0.5" width="1199" height="359" fill="none" stroke="#f2efe9" stroke-opacity="0.06"/>
  <!-- accent dot-mark (echoes the live favicon) -->
  <circle cx="104" cy="96" r="9" fill="url(#accent)"/>
  <!-- eyebrow -->
  <text x="126" y="102" font-family="'Helvetica Neue', Helvetica, Arial, system-ui, sans-serif" font-size="17" font-weight="600" letter-spacing="2.5" fill="#a99e88">THE DAHHAN GROUP</text>
  <!-- wordmark -->
  <text x="96" y="215.16" font-family="'Helvetica Neue', Helvetica, Arial, system-ui, sans-serif" font-size="74" font-weight="400" letter-spacing="-0.4" fill="#f2efe9">Dahhan Enterprises</text>
  <!-- accent underline -->
  <rect x="96" y="234" width="132" height="5" rx="2.5" fill="url(#accent)"/>
  <!-- tagline -->
  <text x="96" y="282" font-family="'Helvetica Neue', Helvetica, Arial, system-ui, sans-serif" font-size="26" font-weight="400" fill="#a99e88">A group of connected operating companies.</text>
</svg>
